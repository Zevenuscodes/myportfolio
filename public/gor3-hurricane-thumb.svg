<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0d0520"/>
      <stop offset="60%" stop-color="#06020f"/>
      <stop offset="100%" stop-color="#03040a"/>
    </radialGradient>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#bc13fe" stop-opacity="0.5"/>
      <stop offset="40%" stop-color="#7b00d4" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#bc13fe" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="outerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00f5ff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00f5ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="strongGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="subtleGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="frame">
      <rect x="0" y="0" width="800" height="450"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bgGrad)"/>

  <!-- Outer atmosphere glow -->
  <ellipse cx="400" cy="225" rx="380" ry="220" fill="url(#outerGlow)"/>

  <!-- Core hurricane glow -->
  <ellipse cx="400" cy="220" rx="200" ry="200" fill="url(#coreGlow)"/>

  <!-- Hurricane spiral rings — outer to inner -->
  <g clip-path="url(#frame)" filter="url(#subtleGlow)">
    <!-- Ring 1 -->
    <ellipse cx="400" cy="220" rx="195" ry="130" fill="none" stroke="#bc13fe" stroke-width="0.6" stroke-opacity="0.18" stroke-dasharray="6 4"/>
    <!-- Ring 2 -->
    <ellipse cx="400" cy="220" rx="170" ry="112" fill="none" stroke="#bc13fe" stroke-width="0.7" stroke-opacity="0.22" stroke-dasharray="5 5" transform="rotate(15 400 220)"/>
    <!-- Ring 3 -->
    <ellipse cx="400" cy="220" rx="145" ry="94" fill="none" stroke="#9b00e8" stroke-width="0.8" stroke-opacity="0.28" stroke-dasharray="4 4" transform="rotate(30 400 220)"/>
    <!-- Ring 4 -->
    <ellipse cx="400" cy="220" rx="120" ry="78" fill="none" stroke="#bc13fe" stroke-width="1" stroke-opacity="0.35" stroke-dasharray="3 4" transform="rotate(45 400 220)"/>
    <!-- Ring 5 -->
    <ellipse cx="400" cy="220" rx="95" ry="62" fill="none" stroke="#bc13fe" stroke-width="1.2" stroke-opacity="0.45" stroke-dasharray="3 3" transform="rotate(60 400 220)"/>
    <!-- Ring 6 -->
    <ellipse cx="400" cy="220" rx="70" ry="46" fill="none" stroke="#d050ff" stroke-width="1.5" stroke-opacity="0.55" transform="rotate(75 400 220)"/>
    <!-- Ring 7 -->
    <ellipse cx="400" cy="220" rx="46" ry="30" fill="none" stroke="#e080ff" stroke-width="2" stroke-opacity="0.7" transform="rotate(90 400 220)"/>
    <!-- Ring 8 inner bright -->
    <ellipse cx="400" cy="220" rx="24" ry="16" fill="none" stroke="#f0a0ff" stroke-width="2.5" stroke-opacity="0.85" transform="rotate(110 400 220)"/>
  </g>

  <!-- Spiral arms -->
  <g filter="url(#glow)" clip-path="url(#frame)">
    <path d="M400,220 Q450,160 500,140 Q560,118 590,150" fill="none" stroke="#bc13fe" stroke-width="1.5" stroke-opacity="0.6"/>
    <path d="M400,220 Q360,270 310,285 Q255,302 230,275" fill="none" stroke="#bc13fe" stroke-width="1.5" stroke-opacity="0.6"/>
    <path d="M400,220 Q455,250 490,295 Q518,335 500,365" fill="none" stroke="#9900cc" stroke-width="1.2" stroke-opacity="0.5"/>
    <path d="M400,220 Q345,188 305,148 Q275,112 290,82" fill="none" stroke="#9900cc" stroke-width="1.2" stroke-opacity="0.5"/>
    <path d="M400,220 Q330,230 295,265 Q260,300 270,340" fill="none" stroke="#7700aa" stroke-width="1" stroke-opacity="0.4"/>
    <path d="M400,220 Q470,215 510,178 Q545,145 535,105" fill="none" stroke="#7700aa" stroke-width="1" stroke-opacity="0.4"/>
  </g>

  <!-- Eye of the hurricane — centre core -->
  <circle cx="400" cy="220" r="12" fill="#1a0030" stroke="#e090ff" stroke-width="1.5" filter="url(#glow)"/>
  <circle cx="400" cy="220" r="5" fill="#bc13fe" filter="url(#strongGlow)"/>

